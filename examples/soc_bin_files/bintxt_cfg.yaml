# bintxt_cfg.yaml — soc_bin_files example
# Pre-built SoC configuration binaries — various formats, ready to unpack.
# Run bintxt.sh to unpack all five .bin files into labeled .txt sources.

version: 1

paths:
  config_dir: configs
  build_dir:  build
  log_dir:    logs

validation:
  fail_on_duplicate_addresses:     true
  fail_on_non_monotonic_addresses: true
  fail_on_stride_mismatch:         true
  fail_on_invalid_hex:             true
  fail_on_invalid_word_count:      true
  fail_on_partial_word:            true
  fail_on_missing_label_address:   true
  checksum_required:               true

defaults:
  address_bits:       32
  word_bits:          8
  words_per_line:     6
  endianness:         little
  checksum_algorithm: crc32

output:
  keep_runs:      10
  track_checksum: false

# ── Five binaries, five different format profiles ─────────────────────────────

binaries:

  # boot_cfg.bin — 32-bit LE, 3 words/line
  # Boot ROM configuration: magic, version, flags, clocks, memory map
  - file: boot_cfg.bin
    label: true
    format:
      address_bits:   32
      word_bits:      32
      words_per_line: 4
      endianness:     little
    checksum:
      algorithm: crc32
    labels:
      - address: 0x00000000
        label: BOOT_IDENTITY
      - address: 0x00000010
        label: MEMORY_MAP
      - address: 0x00000020
        label: SECURITY_AND_CANARY

  # gpio_map.bin — 8-bit, 8 words/line
  # One byte per GPIO pin: mode | pull | open-drain flags
  - file: gpio_map.bin
    label: true
    format:
      address_bits:   32
      word_bits:      8
      words_per_line: 8
      endianness:     little
    checksum:
      algorithm: crc32
    labels:
      - address: 0x00000000
        label: PORT_A
      - address: 0x00000008
        label: PORT_B
      - address: 0x00000010
        label: PORT_C
      - address: 0x00000018
        label: PORT_D
      - address: 0x00000020
        label: RESERVED_AND_SIGNATURE

  # periph_ctrl.bin — 16-bit LE, 4 words/line
  # SPI / I2C / UART / Timer peripheral control registers
  - file: periph_ctrl.bin
    label: true
    format:
      address_bits:   32
      word_bits:      16
      words_per_line: 2
      endianness:     little
    checksum:
      algorithm: md5
    labels:
      - address: 0x00000000
        label: SPI_CTRL
      - address: 0x00000008
        label: I2C_CTRL
      - address: 0x00000010
        label: UART_CTRL
      - address: 0x00000018
        label: TIMER0
      - address: 0x00000020
        label: TIMER1
      - address: 0x00000028
        label: RESERVED
      - address: 0x0000002c
        label: SIGNATURE_AND_VERSION

  # irq_table.bin — 32-bit LE, 4 words/line
  # ARM-style interrupt vector table; each entry is a handler address
  - file: irq_table.bin
    label: true
    format:
      address_bits:   32
      word_bits:      32
      words_per_line: 4
      endianness:     little
    checksum:
      algorithm: crc32
    labels:
      - address: 0x00000000
        label: EXCEPTION_VECTORS
      - address: 0x00000010
        label: RESERVED_VECTORS
      - address: 0x00000020
        label: PERIPHERAL_VECTORS
      - address: 0x00000030
        label: TIMER_AND_GPIO_VECTORS

  # nvmem.bin — 8-bit, big-endian, 2 words/line
  # Factory NV memory: device identity, calibration, serial number
  - file: nvmem.bin
    label: true
    format:
      address_bits:   32
      word_bits:      8
      words_per_line: 2
      endianness:     big
    checksum:
      algorithm: sha256
    labels:
      - address: 0x00000000
        label: DEVICE_MAGIC
      - address: 0x00000004
        label: HW_REV_AND_PRODUCT_ID
      - address: 0x00000008
        label: ADC_CAL
      - address: 0x0000000c
        label: TEMP_AND_OSC_TRIM
      - address: 0x00000010
        label: SERIAL_HI
      - address: 0x00000014
        label: SERIAL_LO
      - address: 0x00000018
        label: RESERVED_AND_CRC
